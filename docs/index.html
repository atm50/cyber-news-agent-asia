<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APAC Cyber Attack News Monitor</title>
<style>
  :root {
    --bg: #0b0f14;
    --card: #131922;
    --border: #232b36;
    --text: #e6edf3;
    --muted: #8b98a5;
    --accent: #ff5c5c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 780px; margin: 0 auto; }
  header { margin-bottom: 20px; }
  h1 { font-size: 1.4rem; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 0.85rem; }
  #status { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .card a {
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.95rem;
    line-height: 1.4;
  }
  .card a:hover { color: var(--accent); text-decoration: underline; }
  .meta {
    display: flex;
    gap: 10px;
    margin-top: 6px;
    font-size: 0.75rem;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .tag {
    background: #1c2531;
    padding: 2px 8px;
    border-radius: 100px;
  }
  .empty { color: var(--muted); padding: 40px 0; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🛡️ APAC Cyber Attack News Monitor</h1>
    <div class="sub">Auto-refreshed every hour from public news sources</div>
    <div id="status">Loading...</div>
  </header>
  <div id="results"></div>
</div>

<script>
async function loadNews() {
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  try {
    const res = await fetch('news.json?t=' + Date.now());
    const data = await res.json();
    const updated = new Date(data.last_updated_utc);
    statusEl.textContent = `Last updated: ${updated.toLocaleString()} · ${data.count} articles`;

    if (!data.items || data.items.length === 0) {
      resultsEl.innerHTML = '<div class="empty">No articles found yet. Check back after the next hourly run.</div>';
      return;
    }

    resultsEl.innerHTML = data.items.map(item => `
      <div class="card">
        <a href="${item.link}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a>
        <div class="meta">
          ${item.source ? `<span class="tag">${escapeHtml(item.source)}</span>` : ''}
          ${item.published ? `<span>${escapeHtml(item.published)}</span>` : ''}
        </div>
      </div>
    `).join('');
  } catch (e) {
    statusEl.textContent = 'Could not load news.json yet — it will appear after the first scheduled run.';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadNews();
setInterval(loadNews, 5 * 60 * 1000); // refresh the view every 5 min in case file updated
</script>
</body>
</html>
