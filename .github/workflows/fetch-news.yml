name: Fetch Cyber News

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
      - name: Fetch news
        run: python fetch_news.py
      - name: Commit results
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add docs/news.json docs/ioc_intel.json docs/ransomware.json
          git diff --quiet --cached || git commit -m "Update news + IOC + ransomware data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
