name: Fetch APAC Cyber News

on:
  schedule:
    # Runs at minute 0 of every hour (UTC time)
    - cron: '0 * * * *'
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run news fetch script
        run: python fetch_news.py

      - name: Commit and push updated news.json
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add docs/news.json docs/ioc_intel.json
          git diff --quiet --cached || git commit -m "Update news data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
